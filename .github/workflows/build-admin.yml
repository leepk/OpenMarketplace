name: Build Admin Docker

on:
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Frontend Env
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_URL }}" > ./admin-web/.env

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/classifieds-admin:latest \
            ./admin-web

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/classifieds-admin:latest

      - name: Deploy To Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |            
            docker compose -p classifieds-admin -f /opt/classifieds/admin-compose.yml pull
            docker compose -p classifieds-admin -f /opt/classifieds/admin-compose.yml up -d --force-recreate
